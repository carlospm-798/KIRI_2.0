<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f4f9;
    }
    h1 {
      margin-top: 20px;
    }
    #buttons {
      margin: 20px 0;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #data-display {
      margin-top: 20px;
      width: 80%;
      max-width: 600px;
      height: 200px;
      border: 1px solid #ccc;
      background: #fff;
      overflow-y: auto;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>ESP32 Control Panel</h1>
  <div id="buttons">
    <button onclick="sendCommand('READ')">Read Value</button>
    <button onclick="sendCommand('START')">Read Continuously (10s)</button>
    <button onclick="sendCommand('RESET')">Reset to 0</button>
  </div>
  <div id="data-display">
    <p>Data will appear here...</p>
  </div>

  <script>
    async function sendCommand(command) {
      try {
        const response = await fetch(`/command`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ command }),
        });
        const data = await response.text();
        displayData(data);
      } catch (error) {
        displayData(`Error: ${error.message}`);
      }
    }

    function displayData(message) {
      const dataDisplay = document.getElementById('data-display');
      const newMessage = document.createElement('p');
      newMessage.textContent = message;
      dataDisplay.appendChild(newMessage);
      dataDisplay.scrollTop = dataDisplay.scrollHeight;
    }
  </script>
</body>
</html>
